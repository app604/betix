workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Betix Sports&Trainings

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect create-certificate \
            --type IOS_DISTRIBUTION \
            --save-locally
          app-store-connect fetch-signing-files \
            com.betix.sportstrainings \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build & Archive
        script: |
          cat > /tmp/auth_key.p8 << 'EOF'
-----BEGIN PRIVATE KEY-----
MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQg7XvCpeK/texI8oBs
1HvDwIilriSO3DON36lmYgigUt+gCgYIKoZIzj0DAQehRANCAAS2Sjknyc1SoJXC
9nGd7qTVZOVPwRg+na080GW+JjR4+LT8WvvAe17SaXgs6WR8QvsHiz8CL6JgjsTL
8X0zBoQZ
-----END PRIVATE KEY-----
EOF
          xcodebuild \
            -project "App.xcodeproj" \
            -scheme "Betix" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Betix.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/auth_key.p8 \
            -authenticationKeyID UVLCPGVX95 \
            -authenticationKeyIssuerID 00612d7a-7852-4d01-a1b4-f703bd0a3278 \
            DEVELOPMENT_TEAM=9NP557QPW7 \
            archive

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath build/Betix.xcarchive \
            -exportPath build/ \
            -exportOptionsPlist exportOptions.plist

    artifacts:
      - build/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
