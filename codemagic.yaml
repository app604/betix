workflows:
  ios-release:
    name: iOS Release Clean
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Betix Sports&Trainings

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.betix.sportstrainings

    scripts:
      - name: Install dependencies
        script: |
          echo "No dependencies"

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "App.xcodeproj" \
            --scheme "Betix"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
