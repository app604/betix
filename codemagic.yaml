workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Betix Sports&Trainings

    scripts:
      - name: Set up code signing
        script: |
          openssl genrsa -out /tmp/rsa_key.pem 2048
          keychain initialize
          app-store-connect fetch-signing-files \
            com.betix.sportstrainings \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @file:/tmp/rsa_key.pem \
            --delete-stale-profiles
          keychain add-certificates
          xcode-project use-profiles
          
      - name: Build & Archive
        script: |
          printf -- '-----BEGIN PRIVATE KEY-----\nMIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQg7XvCpeK/texI8oBs\n1HvDwIilriSO3DON36lmYgigUt+gCgYIKoZIzj0DAQehRANCAAS2Sjknyc1SoJXC\n9nGd7qTVZOVPwRg+na080GW+JjR4+LT8WvvAe17SaXgs6WR8QvsHiz8CL6JgjsTL\n8X0zBoQZ\n-----END PRIVATE KEY-----\n' > /tmp/auth_key.p8
          xcodebuild \
            -project "App.xcodeproj" \
            -scheme "Betix" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Betix.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/auth_key.p8 \
            -authenticationKeyID UVLCPGVX95 \
            -authenticationKeyIssuerID 00612d7a-7852-4d01-a1b4-f703bd0a3278 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM=9NP557QPW7 \
            archive

      - name: Export IPA
        script: |
          printf -- '-----BEGIN PRIVATE KEY-----\nMIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQg7XvCpeK/texI8oBs\n1HvDwIilriSO3DON36lmYgigUt+gCgYIKoZIzj0DAQehRANCAAS2Sjknyc1SoJXC\n9nGd7qTVZOVPwRg+na080GW+JjR4+LT8WvvAe17SaXgs6WR8QvsHiz8CL6JgjsTL\n8X0zBoQZ\n-----END PRIVATE KEY-----\n' > /tmp/auth_key.p8
          xcodebuild \
            -exportArchive \
            -archivePath build/Betix.xcarchive \
            -exportPath build/ \
            -exportOptionsPlist exportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/auth_key.p8 \
            -authenticationKeyID UVLCPGVX95 \
            -authenticationKeyIssuerID 00612d7a-7852-4d01-a1b4-f703bd0a3278

    artifacts:
      - build/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
